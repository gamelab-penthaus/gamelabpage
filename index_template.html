<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JZ Penthaus</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 { font-family: 'Raleway', sans-serif; font-size: 40px; color: #000000; font-weight: normal; }
        h2 { font-family: 'Raleway', sans-serif; font-size: 33px; color: #000000; font-weight: normal; }
        h3 { font-family: 'Raleway', sans-serif; font-size: 28px; color: #000000; font-weight: normal; }
        h4 { font-family: 'Raleway', sans-serif; font-size: 23px; color: #000000; font-weight: normal; }
        h5 { font-family: 'Raleway', sans-serif; font-size: 19px; color: #ffffff; font-weight: normal; }
        h6 { font-family: 'Raleway', sans-serif; font-size: 16px; color: #ffffff; font-weight: normal; }

        main {
            flex: 1;
        }

        footer {
            background-color: #444444;
            color: #ffffff;
            padding: 30px 0;
        }

        .footer-inner {
            width: 33.333%;
            margin: 0 auto;
        }

        .footer-links {
            text-align: right;
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #ffffff;
            text-decoration: none;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 14px;
            margin-left: 20px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-text {
            text-align: left;
            font-size: 14px;
            color: #ffffff;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <main>
        <!-- Dein Inhalt kommt hier rein -->
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-links">
                <a href="https://www.jzpenthaus.de/impressum" target="_blank">Impressum</a>
                <a href="https://www.jzpenthaus.de/datenschutz" target="_blank">Datenschutz</a>
            </div>
            <div class="footer-text">
                © KJR München-Stadt e.V. | Kreisjugendring München-Stadt
            </div>
        </div>
    </footer>

</body>
</html>
